<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 – Erro interno · SisCPTI</title>
  <meta name="description" content="Ocorreu um erro interno no servidor do SisCPTI UniCEUB. Tente novamente em instantes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Orbs de fundo animados */
    .error-page::before,
    .error-page::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      animation: floatOrb 8s ease-in-out infinite;
      pointer-events: none;
    }
    .error-page::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #f97316, transparent);
      top: -150px; left: -150px;
    }
    .error-page::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7A1BB5, transparent);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(30px) scale(1.05); }
    }

    .error-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 3rem 2.5rem;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      max-width: 550px;
      width: 100%;
      box-sizing: border-box;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all var(--transition-speed) ease;
    }
    body.dark-theme .error-card {
      background: rgba(30, 27, 75, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f97316, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 0.5rem;
      letter-spacing: -4px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .error-icon {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0.5rem 0;
    }

    .error-message {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 440px;
      line-height: 1.6;
      margin: 0.5rem auto 1.5rem;
    }

    .countdown-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    #countdown-num {
      font-weight: 700;
      color: #ea580c;
      font-size: 0.95rem;
    }

    .progress-bar-wrap {
      width: 150px;
      height: 4px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #ea580c);
      border-radius: 4px;
      width: 0%;
      animation: progressFill 30s linear forwards;
    }

    @keyframes progressFill {
      from { width: 0%; }
      to { width: 100%; }
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .btn-primary-error {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.8rem;
      background: #4B006E !important;
      background: linear-gradient(135deg, #4B006E, #7A1BB5) !important;
      color: #ffffff !important;
      border: none;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 16px rgba(122, 27, 181, 0.25);
    }

    body.dark-theme .btn-primary-error {
      background: #a855f7 !important;
      background: linear-gradient(135deg, #a855f7, #c084fc) !important;
      color: #ffffff !important;
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.25);
    }

    .btn-primary-error:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(122, 27, 181, 0.4);
      filter: brightness(1.1);
    }

    .btn-ghost-error {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.8rem;
      background: transparent !important;
      color: #4B006E !important;
      border: 2px solid #4B006E !important;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    body.dark-theme .btn-ghost-error {
      color: #a855f7 !important;
      border-color: #a855f7 !important;
    }

    .btn-ghost-error:hover {
      background: var(--purple-primary);
      color: #fff;
      transform: translateY(-2px);
    }

    .divider-line {
      width: 50px;
      height: 4px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 4px;
      margin: 1rem auto;
    }
  </style>
</head>
<body id="errorBody">
  <div class="error-page">
    <!-- Logo CEUB unificado -->
    <a href="{{ url_for('index') }}" style="margin-bottom: 2rem; position: relative; z-index: 10;">
      <img src="{{ url_for('static', filename='logoCEUB.png') }}?v=2"
           alt="CEUB"
           style="height: 45px; opacity: 0.85;"
           onerror="this.onerror=null; this.src='/static/logoCEUB.png?v=2';">
    </a>

    <div class="error-card">
      <div class="error-icon">⚙️</div>
      <p class="error-code">500</p>
      <div class="divider-line"></div>
      <h1 class="error-title">Erro interno no servidor</h1>
      <p class="error-message">
        Algo inesperado aconteceu no nosso servidor. Nossa equipe já foi notificada
        e está trabalhando para resolver o problema. Tente novamente em alguns instantes.
      </p>
      <div class="countdown-wrap">
        ⏱ Redirecionando em <span id="countdown-num">30</span>s
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn-primary-error" id="btn-home-500">
          🏠 Ir para o Início
        </a>
        <button onclick="location.reload()" class="btn-ghost-error" id="btn-retry-500">
          🔄 Tentar Novamente
        </button>
      </div>
    </div>
  </div>

  <script>
    // Aplicar tema salvo
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.getElementById('errorBody').classList.add('dark-theme');
      }
    })();

    // Countdown e redirecionamento automático
    let seconds = 30;
    const countEl = document.getElementById('countdown-num');
    const interval = setInterval(() => {
      seconds--;
      if (countEl) countEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
